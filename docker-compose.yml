services:

  mysql:
    image: mysql:8
    container_name: mysql-container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 1234
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql   #
    networks:
      - shopsphere-network

  discovery-service:
    image: discovery-service
    container_name: discovery-service
    ports:
      - "8761:8761"
    networks:
      - shopsphere-network


  kafka:
    image: apache/kafka:4.0.2
    container_name: kafka-container

    ports:
      - "9092:9092"

    environment:
      CLUSTER_ID: "5L6g3nShT-eMCtK--X86sw"

      KAFKA_NODE_ID: 1

      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-container:9092

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-container:9093

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

    networks:
      - shopsphere-network

  gateway-service:
    image: gateway-service
    container_name: gateway-service
    ports:
      - "8083:8083"
    depends_on:
      - discovery-service
    networks:
      - shopsphere-network

  user-service:
    image: user-service
    container_name: user-service
    ports:
      - "8080:8080"
    networks:
      - shopsphere-network
    depends_on:
      - mysql
      - discovery-service

  product-service:
    image: product-service
    container_name: product-service
    ports:
      - "8081:8081"
    depends_on:
      - mysql
      - discovery-service
    networks:
      - shopsphere-network

  inventory-service:
    image: inventory-service
    container_name: inventory-service
    ports:
      - "8084:8084"
    depends_on:
      - mysql
      - kafka
      - discovery-service
    networks:
      - shopsphere-network

  order-service:
    image: order-service
    container_name: order-service
    ports:
      - "8082:8082"

    depends_on:
      - mysql
      - kafka
      - discovery-service

    networks:
      - shopsphere-network

  payment-service:
    image: payment-service
    container_name: payment-service
    ports:
      - "8085:8085"

    depends_on:
      - mysql
      - kafka
      - discovery-service

    networks:
      - shopsphere-network

networks:
  shopsphere-network:
volumes:
  mysql_data: