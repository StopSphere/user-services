spring:
  application:
    name: user-service

  datasource:
    url: jdbc:mysql://localhost:3307/user_db
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

jwt:
  secret: mysupersecretkeymysupersecretkey123
  expiration: 600000
